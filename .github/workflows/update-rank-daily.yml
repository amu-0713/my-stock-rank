name: 每日自動更新排名與圖表

on:
  schedule:
    - cron: '00 8 * * 1-5'
  workflow_dispatch:      # 允許手動執行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout 最新程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install finlab pandas numpy plotly kaleido
      
      - name: 1.執行排名更新 (dynamic_factor)
        env:
          FINLAB_TOKEN: ${{ secrets.FINLAB_TOKEN }}
        run: python scripts/generate_dynamic_factor.py
        continue-on-error: true
      
     # - name: 2.執行排名更新 (high_div_low)
      #    env:
       #     FINLAB_TOKEN: ${{ secrets.FINLAB_TOKEN }}
      #    run: python scripts/generate_high_div_low_vol.py
        #  continue-on-error: true 
        
      - name: Commit & Push 更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github_actions"
          
          # 檢查 public/ 資料夾下是否有任何檔案變動
          if [ -n "$(git status --porcelain public/)" ]; then
            echo "檢測到數據變動，正在推送到 GitHub..."
            git add public/
            git commit -m "🤖 每日自動更新排名與圖表: $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase
            git push
          else
            echo "數據無變動，跳過 Commit。"
          fi
