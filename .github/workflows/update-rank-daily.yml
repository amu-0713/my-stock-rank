name: 每日自動更新排名與圖表

on:
  schedule:
    - cron: '0 8 * * *'   # 台灣時間晚上 7:30
  workflow_dispatch:        # 允許手動執行

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 最新程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴
        run: pip install finlab pandas numpy plotly kaleido

      - name: 執行排名更新 (result.json)
        env:
          FINLAB_TOKEN: ${{ secrets.FINLAB_TOKEN }}
        run: python scripts/generate_and_push.py

      - name: 執行圖表生成
        env:
          FINLAB_TOKEN: ${{ secrets.FINLAB_TOKEN }}
        run: python scripts/chart_generator.py

      - name: Commit & Push 更新
        uses: EndBug/add-and-commit@v10
        with:
          add: 'public/'
          message: '🤖 每日自動更新排名與圖表'
          default_author: github_actions
