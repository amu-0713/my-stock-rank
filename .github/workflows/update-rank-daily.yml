name: 每日自動更新量化排名

on:
  schedule:
    - cron: '30 11 * * *'      # 台灣時間晚上 7:30
  workflow_dispatch:

# 關鍵：加入權限設定
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 最新程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝依賴
        run: pip install finlab pandas numpy

      - name: 執行更新腳本
        env:
          FINLAB_TOKEN: ${{ secrets.FINLAB_TOKEN }}
        run: python scripts/generate_and_push.py

      - name: Commit & Push result.json
        uses: EndBug/add-and-commit@v10
        with:
          add: 'public/result.json'
          message: '🤖 每日自動更新 result.json (晚上7:30)'
          default_author: github_actions